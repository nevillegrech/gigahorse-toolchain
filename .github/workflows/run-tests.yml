name: CI-Tests

on:
  workflow_dispatch:
  workflow_call:
  pull_request:
  push:
    branches:
      - 'master'

env:
  REGISTRY: ghcr.io
  # github.repository as nevillegrech/gigahorse-toolchain
  IMAGE_NAME: ${{ github.repository }}
  # uv copies (rather than hardlinks) into the venv — avoids cross-filesystem
  # hardlink warnings on the CI runners/containers.
  UV_LINK_MODE: copy


jobs:
  # Fast lint/format gate. Every job below declares `needs: ruff`, so a lint or
  # formatting failure blocks the (expensive) Souffle test jobs and the type-checker
  # from running at all. Mark this check "Required" in branch protection to also
  # block merges to master.
  ruff:
    runs-on: ubuntu-latest
    name: Ruff (lint + format)
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "latest"
      - name: Ruff lint
        run: uv run --frozen ruff check --output-format=github
      - name: Ruff format check
        run: uv run --frozen ruff format --check

  test_souffle23:
    runs-on: ubuntu-latest
    needs: ruff
    permissions:
      contents: read
      packages: write
      checks: write
      pull-requests: write

    container:
      image: ghcr.io/nevillegrech/gigahorse-toolchain-deps-souffle23:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # uv is provided by the deps image, but install it here too so the workflow
      # is self-sufficient (e.g. before the deps image is rebuilt with uv).
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "latest"

      - name: Test Souffle
        run: souffle --version

      - name: Build Souffle addon
        run: cd $GITHUB_WORKSPACE/souffle-addon && make && cd $GITHUB_WORKSPACE

      # Create the project venv (managed CPython 3.13) with the dev group (pytest).
      - name: Sync Python environment (uv, CPython 3.13)
        run: uv sync --frozen

      - name: Run gigahorse help
        run: uv run --frozen ./gigahorse.py --help

      - name: Run gigahorse example
        run: uv run --frozen ./gigahorse.py examples/long_running.hex -i --disable_inline

      - name: Run tests
        run: uv run --frozen pytest -v test_gigahorse.py --junitxml=test-results.xml

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: test-results.xml
          check_name: "Test Results (Souffle 2.3)"

  test_souffle24:
    runs-on: ubuntu-latest
    needs: ruff
    permissions:
      contents: read
      packages: write
      checks: write
      pull-requests: write

    container:
      image: ghcr.io/nevillegrech/gigahorse-toolchain-deps-souffle24:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # uv is provided by the deps image, but install it here too so the workflow
      # is self-sufficient (e.g. before the deps image is rebuilt with uv).
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "latest"

      - name: Test Souffle
        run: souffle --version

      - name: Build Souffle addon
        run: cd $GITHUB_WORKSPACE/souffle-addon && make && cd $GITHUB_WORKSPACE

      # Create the project venv (managed CPython 3.13) with the dev group (pytest).
      - name: Sync Python environment (uv, CPython 3.13)
        run: uv sync --frozen

      - name: Run gigahorse help
        run: uv run --frozen ./gigahorse.py --help

      - name: Run gigahorse example
        run: uv run --frozen ./gigahorse.py examples/long_running.hex -i --disable_inline

      - name: Run tests
        run: uv run --frozen pytest -v test_gigahorse.py --junitxml=test-results.xml

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: test-results.xml
          check_name: "Test Results (Souffle 2.4)"
  mypy:
    runs-on: ubuntu-latest
    name: Mypy
    needs: ruff
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    - name: Install uv
      uses: astral-sh/setup-uv@v6
      with:
        version: "latest"
    # `uv run mypy` (no args) type-checks the paths in [tool.mypy] files under the
    # pinned CPython 3.13 — mirrors (and consolidates) the previous per-file runs.
    - name: mypy
      run: uv run --frozen mypy
